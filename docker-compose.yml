# ============================================================
# Docker Compose — Generative AI Analysis Platform
# Orchestrates backend (FastAPI), frontend (React/Vite),
# and PostgreSQL database for local development.
#
# Usage:
#   docker compose up --build     → start everything
#   docker compose down -v        → stop and remove volumes
# ============================================================

version: "3.8"

services:

  # ── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai_analysis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_analysis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the docker postgres service
      - DATABASE_URL=postgresql+psycopg2://postgres:password@postgres:5432/ai_analysis_db
    volumes:
      - ./datasets:/app/datasets
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
